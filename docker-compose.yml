services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: findjob-postgres
    environment:
      POSTGRES_USER: findjob
      POSTGRES_PASSWORD: findjob
      POSTGRES_DB: findjob
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findjob -d findjob"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: findjob-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
